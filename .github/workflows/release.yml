name: Auto Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v5.0-multi10)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ============================================================
  # Stage 1: Build all packages
  # ============================================================
  build-deb:
    uses: ./.github/workflows/build-deb.yml
    secrets: inherit

  build-rpm:
    uses: ./.github/workflows/build-rpm.yml
    secrets: inherit

  # ============================================================
  # Stage 2: Run smoke tests
  # ============================================================
  test:
    needs: [build-deb]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-24.04
            container: ubuntu:24.04
          - distro: debian-12
            container: debian:12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download DEB artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: debs-${{ matrix.distro }}-*-amd64
          path: debs/
          merge-multiple: true

      - name: Run smoke test
        run: |
          cat > Dockerfile.test << EOF
          FROM ${{ matrix.container }}
          ENV DEBIAN_FRONTEND=noninteractive

          RUN apt-get update && apt-get install -y \
              sudo procps libatomic1 adduser \
              libxml2 libreadline8 \
              libpam0g liblz4-1 libzstd1 libcurl4 \
              libsasl2-2 \
              && (apt-get install -y libssl1.1 2>/dev/null || apt-get install -y libssl3 2>/dev/null || true) \
              && (apt-get install -y libldap-2.4-2 2>/dev/null || apt-get install -y libldap-2.5-0 2>/dev/null || apt-get install -y libldap-common 2>/dev/null || true) \
              && rm -rf /var/lib/apt/lists/*

          COPY debs/*.deb /tmp/debs/
          RUN dpkg --force-depends -i /tmp/debs/*.deb
          RUN mkdir -p /usr/lib/opentenbase/5.0/lib/postgresql
          RUN ldconfig || true
          # Ensure opentenbase user exists
          RUN id opentenbase 2>/dev/null || (addgroup --system opentenbase && adduser --system --ingroup opentenbase --home /var/lib/opentenbase --shell /bin/bash opentenbase)
          RUN mkdir -p /var/lib/opentenbase/5.0 /var/log/opentenbase/5.0 /var/run/opentenbase
          RUN chown -R opentenbase:opentenbase /var/lib/opentenbase /var/log/opentenbase /var/run/opentenbase 2>/dev/null || true

          COPY test/smoke-test.sh /test/
          RUN chmod +x /test/smoke-test.sh

          CMD ["/test/smoke-test.sh"]
          EOF

          docker build -f Dockerfile.test -t opentenbase-test:${{ matrix.distro }} .
          docker run --rm --cap-add SYS_PTRACE opentenbase-test:${{ matrix.distro }} || {
            echo "=== Smoke test failed, checking GTM log ==="
            docker run --rm --cap-add SYS_PTRACE opentenbase-test:${{ matrix.distro }} bash -c "
              /test/smoke-test.sh 2>&1 || true
              echo '=== GTM Log ==='
              cat /var/log/opentenbase/5.0/gtm.log 2>/dev/null || echo 'No GTM log found'
              echo '=== GTM Config ==='
              cat /var/lib/opentenbase/5.0/gtm/gtm.conf 2>/dev/null || echo 'No GTM config found'
            "
            exit 1
          }

  # ============================================================
  # Stage 3: Generate release notes and publish
  # ============================================================
  release:
    needs: [build-deb, build-rpm, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always() && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=$INPUT_TAG" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        id: notes
        run: |
          chmod +x scripts/generate-release-notes.sh
          ./scripts/generate-release-notes.sh "${{ steps.version.outputs.tag }}"
          echo "notes_file=release-notes-${{ steps.version.outputs.tag }}.md" >> $GITHUB_OUTPUT

      - name: Download all DEB artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          path: release/debs/
          merge-multiple: true

      - name: Download all RPM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rpms-*
          path: release/rpms/
          merge-multiple: true

      - name: Check GPG signing availability
        id: gpg_check
        env:
          HAS_GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -n "$HAS_GPG_KEY" ]; then
            echo "has_gpg=true" >> $GITHUB_OUTPUT
            echo "GPG signing is enabled"
          else
            echo "has_gpg=false" >> $GITHUB_OUTPUT
            echo "GPG signing is skipped (no GPG_PRIVATE_KEY secret)"
          fi

      - name: Install GPG signing tools
        if: steps.gpg_check.outputs.has_gpg == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-sig rpm gpg

      - name: Sign packages (GPG)
        if: steps.gpg_check.outputs.has_gpg == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          chmod +x scripts/sign-packages.sh
          scripts/sign-packages.sh --ci \
            --deb-dir release/debs \
            --rpm-dir release/rpms \
            --export release/opentenbase-gpg-key.asc

      - name: Generate checksums
        run: |
          cd release
          find . -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.sig" -o -name "*.asc" -o -name "*.key" \) \
            -exec sha256sum {} \; > checksums.sha256
          cat checksums.sha256

      - name: Verify signatures (if signed)
        if: steps.gpg_check.outputs.has_gpg == 'true'
        run: |
          chmod +x scripts/sign-packages.sh
          scripts/sign-packages.sh --verify-deb release/debs --verify-rpm release/rpms || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: OpenTenBase ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: false
          files: |
            release/debs/**/*.deb
            release/debs/**/*.sig
            release/rpms/**/*.rpm
            release/checksums.sha256
            release/opentenbase-gpg-key.asc
            scripts/install.sh
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release ${{ steps.version.outputs.tag }} Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packages" >> $GITHUB_STEP_SUMMARY
          echo "- DEB: $(find release/debs -name '*.deb' | wc -l) packages" >> $GITHUB_STEP_SUMMARY
          echo "- RPM: $(find release/rpms -name '*.rpm' | wc -l) packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.gpg_check.outputs.has_gpg }}" = "true" ]; then
            echo "### GPG Signing" >> $GITHUB_STEP_SUMMARY
            echo "- Packages are GPG-signed" >> $GITHUB_STEP_SUMMARY
            echo "- Public key: \`opentenbase-gpg-key.asc\`" >> $GITHUB_STEP_SUMMARY
            echo "- Detached signatures (DEB): \`*.sig\` files" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "### Install" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "curl -sSL https://github.com/CDUESTC-OpenAtom-Open-Source-Club/OpenTenBase-Packages/releases/download/${{ steps.version.outputs.tag }}/install.sh | sudo bash" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
