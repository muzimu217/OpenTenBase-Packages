name: Stress Test

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenTenBase version to test'
        required: false
        default: '5.0'
        type: string
      duration:
        description: 'pgbench duration in seconds'
        required: false
        default: '60'
        type: string
      clients:
        description: 'Number of concurrent clients'
        required: false
        default: '16'
        type: string

jobs:
  stress-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client procps

      - name: Install OpenTenBase
        env:
          OTB_VERSION: ${{ inputs.version || '5.0' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download DEB packages from latest release
          RELEASE_TAG=$(curl -sL "https://api.github.com/repos/muzimu217/OpenTenBase-deb/releases/latest" | jq -r '.tag_name')
          mkdir -p /tmp/debs
          cd /tmp/debs
          gh release download "$RELEASE_TAG" \
            --pattern "opentenbase_${OTB_VERSION}*.deb" \
            --pattern "opentenbase-server_${OTB_VERSION}*.deb" \
            --pattern "opentenbase-client_${OTB_VERSION}*.deb" \
            --pattern "opentenbase-contrib_${OTB_VERSION}*.deb" \
            --pattern "libopentenbase-dev_${OTB_VERSION}*.deb" \
            --repo muzimu217/OpenTenBase-deb || true

          # If no version-specific DEBs, try without version filter
          if [ $(ls *.deb 2>/dev/null | wc -l) -eq 0 ]; then
            gh release download "$RELEASE_TAG" \
              --pattern "*noble*.deb" \
              --repo muzimu217/OpenTenBase-deb || true
          fi

          sudo dpkg --force-depends -i *.deb || true
          sudo ldconfig

      - name: Initialize cluster
        env:
          OTB_VERSION: ${{ inputs.version || '5.0' }}
        run: |
          OTB_BIN="/usr/lib/opentenbase/${OTB_VERSION}/bin"
          OTB_HOME="/var/lib/opentenbase/${OTB_VERSION}"
          OTB_USER="opentenbase"

          # Ensure user exists
          id $OTB_USER 2>/dev/null || {
            sudo groupadd --system $OTB_USER 2>/dev/null || true
            sudo useradd --system --gid $OTB_USER --home-dir /var/lib/opentenbase --shell /bin/bash $OTB_USER 2>/dev/null || true
          }

          sudo mkdir -p $OTB_HOME/{gtm,dn1,coord} /var/log/opentenbase
          sudo chown -R $OTB_USER:$OTB_USER /var/lib/opentenbase /var/log/opentenbase

          # Reduce shared memory for CI
          export PG_SHMEM_PAGES=512

          # Init GTM
          sudo -u $OTB_USER env LD_LIBRARY_PATH="/usr/lib/opentenbase/${OTB_VERSION}/lib" \
            $OTB_BIN/initgtm -Z gtm -D $OTB_HOME/gtm

          cat > /tmp/gtm.conf <<EOF
          listen_addresses = '*'
          port = 6666
          nodename = 'one'
          EOF
          sudo cp /tmp/gtm.conf $OTB_HOME/gtm/gtm.conf
          sudo chown $OTB_USER:$OTB_USER $OTB_HOME/gtm/gtm.conf

          # Init Datanode
          sudo -u $OTB_USER env LD_LIBRARY_PATH="/usr/lib/opentenbase/${OTB_VERSION}/lib" \
            $OTB_BIN/initdb -D $OTB_HOME/dn1 --nodename=dn1 --nodetype=datanode \
            --master_gtm_nodename=one --master_gtm_ip=127.0.0.1 --master_gtm_port=6666

          sudo bash -c "cat >> $OTB_HOME/dn1/postgresql.conf <<EOF
          port = 5433
          pooler_port = 6668
          listen_addresses = '*'
          EOF"
          [ "$OTB_VERSION" = "5.0" ] && sudo bash -c "echo 'forward_port = 6670' >> $OTB_HOME/dn1/postgresql.conf"

          # Init Coordinator
          sudo -u $OTB_USER env LD_LIBRARY_PATH="/usr/lib/opentenbase/${OTB_VERSION}/lib" \
            $OTB_BIN/initdb -D $OTB_HOME/coord --nodename=coord --nodetype=coordinator \
            --master_gtm_nodename=one --master_gtm_ip=127.0.0.1 --master_gtm_port=6666

          sudo bash -c "cat >> $OTB_HOME/coord/postgresql.conf <<EOF
          port = 5432
          pooler_port = 6669
          listen_addresses = '*'
          EOF"
          [ "$OTB_VERSION" = "5.0" ] && sudo bash -c "echo 'forward_port = 6671' >> $OTB_HOME/coord/postgresql.conf"

          sudo bash -c "echo 'host all all 0.0.0.0/0 trust' >> $OTB_HOME/coord/pg_hba.conf"
          sudo bash -c "echo 'host all all 0.0.0.0/0 trust' >> $OTB_HOME/dn1/pg_hba.conf"

          # Start GTM
          sudo bash -c "sudo -u $OTB_USER env LD_LIBRARY_PATH=/usr/lib/opentenbase/${OTB_VERSION}/lib \
            $OTB_BIN/gtm -D $OTB_HOME/gtm > /var/log/opentenbase/gtm.log 2>&1 &"
          sleep 3

          # Start Datanode
          sudo bash -c "sudo -u $OTB_USER env LD_LIBRARY_PATH=/usr/lib/opentenbase/${OTB_VERSION}/lib \
            $OTB_BIN/postgres --datanode -D $OTB_HOME/dn1 > /var/log/opentenbase/dn.log 2>&1 &"
          sleep 3

          # Start Coordinator
          sudo bash -c "sudo -u $OTB_USER env LD_LIBRARY_PATH=/usr/lib/opentenbase/${OTB_VERSION}/lib \
            $OTB_BIN/postgres --coordinator -D $OTB_HOME/coord > /var/log/opentenbase/coord.log 2>&1 &"
          sleep 3

          # Verify all processes are running
          pgrep -f gtm > /dev/null || { echo "GTM not running"; cat /var/log/opentenbase/gtm.log; exit 1; }
          pgrep -f "postgres.*datanode" > /dev/null || { echo "Datanode not running"; cat /var/log/opentenbase/dn.log; exit 1; }
          pgrep -f "postgres.*coordinator" > /dev/null || { echo "Coordinator not running"; cat /var/log/opentenbase/coord.log; exit 1; }

          echo "Cluster started successfully"

      - name: Register nodes
        env:
          OTB_VERSION: ${{ inputs.version || '5.0' }}
        run: |
          OTB_BIN="/usr/lib/opentenbase/${OTB_VERSION}/lib"
          PSQL="$OTB_BIN/../bin/psql -h 127.0.0.1 -p 5432 -U opentenbase -d postgres -X -q -v ON_ERROR_STOP=0"

          # Register on Coordinator
          sudo -u opentenbase env LD_LIBRARY_PATH="$OTB_BIN" \
            $PSQL -c "CREATE GTM NODE gtm_master WITH (HOST='127.0.0.1', PORT=6666, PRIMARY);" 2>/dev/null || true
          sudo -u opentenbase env LD_LIBRARY_PATH="$OTB_BIN" \
            $PSQL -c "ALTER GTM NODE gtm_master WITH (HOST='127.0.0.1', PORT=6666, PRIMARY);" 2>/dev/null || true

          if [ "$OTB_VERSION" = "5.0" ]; then
            sudo -u opentenbase env LD_LIBRARY_PATH="$OTB_BIN" \
              $PSQL -c "CREATE NODE dn1 WITH (TYPE='datanode', HOST='127.0.0.1', PORT=5433, FORWARD=6670, PRIMARY, PREFERRED);" 2>/dev/null || true
            sudo -u opentenbase env LD_LIBRARY_PATH="$OTB_BIN" \
              $PSQL -c "ALTER NODE dn1 WITH (TYPE='datanode', HOST='127.0.0.1', PORT=5433, FORWARD=6670, PRIMARY, PREFERRED);" 2>/dev/null || true
          else
            sudo -u opentenbase env LD_LIBRARY_PATH="$OTB_BIN" \
              $PSQL -c "CREATE NODE dn1 WITH (TYPE='datanode', HOST='127.0.0.1', PORT=5433, PRIMARY, PREFERRED);" 2>/dev/null || true
            sudo -u opentenbase env LD_LIBRARY_PATH="$OTB_BIN" \
              $PSQL -c "ALTER NODE dn1 WITH (TYPE='datanode', HOST='127.0.0.1', PORT=5433, PRIMARY, PREFERRED);" 2>/dev/null || true
          fi

          sudo -u opentenbase env LD_LIBRARY_PATH="$OTB_BIN" \
            $PSQL -c "SELECT pgxc_pool_reload();" 2>/dev/null || true

          # Create node group and sharding
          sudo -u opentenbase env LD_LIBRARY_PATH="$OTB_BIN" \
            $PSQL -c "CREATE DEFAULT NODE GROUP default_group WITH (dn1);" 2>/dev/null || true
          sudo -u opentenbase env LD_LIBRARY_PATH="$OTB_BIN" \
            $PSQL -c "CREATE SHARDING GROUP TO GROUP default_group;" 2>/dev/null || true

          echo "Nodes registered"

      - name: Run pgbench stress test
        env:
          OTB_VERSION: ${{ inputs.version || '5.0' }}
          DURATION: ${{ inputs.duration || '60' }}
          CLIENTS: ${{ inputs.clients || '16' }}
        run: |
          OTB_BIN="/usr/lib/opentenbase/${OTB_VERSION}/bin"
          PSQL="$OTB_BIN/psql -h 127.0.0.1 -p 5432 -U opentenbase -d postgres"
          PGBENCH="$OTB_BIN/pgbench -h 127.0.0.1 -p 5432 -U opentenbase -d postgres"

          echo "=== Stress Test Configuration ==="
          echo "  Version: $OTB_VERSION"
          echo "  Duration: ${DURATION}s"
          echo "  Clients: $CLIENTS"
          echo ""

          # Create sharding table
          echo "=== Creating test table ==="
          sudo -u opentenbase env LD_LIBRARY_PATH="/usr/lib/opentenbase/${OTB_VERSION}/lib" \
            $PSQL -c "CREATE TABLE stress_test (id int PRIMARY KEY, val text) DISTRIBUTE BY SHARD(id);"

          # Insert initial data
          echo "=== Inserting initial data (10000 rows) ==="
          sudo -u opentenbase env LD_LIBRARY_PATH="/usr/lib/opentenbase/${OTB_VERSION}/lib" \
            $PSQL -c "INSERT INTO stress_test SELECT i, 'row_' || i FROM generate_series(1, 10000) i;"

          COUNT=$(sudo -u opentenbase env LD_LIBRARY_PATH="/usr/lib/opentenbase/${OTB_VERSION}/lib" \
            $PSQL -t -A -c "SELECT count(*) FROM stress_test;")
          echo "  Rows inserted: $COUNT"

          # Initialize pgbench
          echo ""
          echo "=== Initializing pgbench ==="
          sudo -u opentenbase env LD_LIBRARY_PATH="/usr/lib/opentenbase/${OTB_VERSION}/lib" \
            $PGBENCH -i -s 10 2>&1 || echo "pgbench init may have partial failures (expected for distributed DB)"

          # Run pgbench SELECT test
          echo ""
          echo "=== pgbench SELECT Test (${DURATION}s, ${CLIENTS} clients) ==="
          sudo -u opentenbase env LD_LIBRARY_PATH="/usr/lib/opentenbase/${OTB_VERSION}/lib" \
            $PGBENCH -c $CLIENTS -j 4 -T $DURATION -S 2>&1 | tee /tmp/pgbench-select.txt

          # Run pgbench mixed test
          echo ""
          echo "=== pgbench Mixed Read/Write Test (${DURATION}s, ${CLIENTS} clients) ==="
          sudo -u opentenbase env LD_LIBRARY_PATH="/usr/lib/opentenbase/${OTB_VERSION}/lib" \
            $PGBENCH -c $CLIENTS -j 4 -T $DURATION 2>&1 | tee /tmp/pgbench-mixed.txt

          # Custom high-concurrency INSERT test
          echo ""
          echo "=== High-Concurrency INSERT Test ==="
          for i in $(seq 1 $CLIENTS); do
            sudo -u opentenbase env LD_LIBRARY_PATH="/usr/lib/opentenbase/${OTB_VERSION}/lib" \
              $PSQL -c "INSERT INTO stress_test SELECT i + $((i * 100000)), 'concurrent_' || i FROM generate_series(1, 1000) i;" &
          done
          wait

          FINAL_COUNT=$(sudo -u opentenbase env LD_LIBRARY_PATH="/usr/lib/opentenbase/${OTB_VERSION}/lib" \
            $PSQL -t -A -c "SELECT count(*) FROM stress_test;")
          echo "  Final row count: $FINAL_COUNT"

          # Data consistency check
          echo ""
          echo "=== Data Consistency Check ==="
          DUPES=$(sudo -u opentenbase env LD_LIBRARY_PATH="/usr/lib/opentenbase/${OTB_VERSION}/lib" \
            $PSQL -t -A -c "SELECT count(*) FROM (SELECT id, count(*) FROM stress_test GROUP BY id HAVING count(*) > 1) t;")
          [ "$DUPES" = "0" ] && echo "  No duplicate IDs: PASS" || echo "  Duplicate IDs found: FAIL ($DUPES)"

          # Large batch INSERT test
          echo ""
          echo "=== Large Batch INSERT (100000 rows) ==="
          START=$(date +%s)
          sudo -u opentenbase env LD_LIBRARY_PATH="/usr/lib/opentenbase/${OTB_VERSION}/lib" \
            $PSQL -c "INSERT INTO stress_test SELECT i + 2000000, 'batch_' || i FROM generate_series(1, 100000) i;"
          END=$(date +%s)
          echo "  Duration: $((END - START))s"

          # Complex JOIN query test
          echo ""
          echo "=== Complex Query Test ==="
          START=$(date +%s)
          sudo -u opentenbase env LD_LIBRARY_PATH="/usr/lib/opentenbase/${OTB_VERSION}/lib" \
            $PSQL -c "SELECT count(*), avg(id), min(id), max(id) FROM stress_test WHERE id > 100000;"
          END=$(date +%s)
          echo "  Duration: $((END - START))s"

      - name: Collect results
        if: always()
        run: |
          echo "## Stress Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/pgbench-select.txt ]; then
            TPS=$(grep "tps = " /tmp/pgbench-select.txt | tail -1 | awk '{print $3}')
            echo "| SELECT TPS | $TPS |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f /tmp/pgbench-mixed.txt ]; then
            TPS=$(grep "tps = " /tmp/pgbench-mixed.txt | tail -1 | awk '{print $3}')
            echo "| Mixed TPS | $TPS |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup
        if: always()
        run: |
          pkill -f "postgres.*coordinator" 2>/dev/null || true
          pkill -f "postgres.*datanode" 2>/dev/null || true
          pkill -f gtm 2>/dev/null || true
