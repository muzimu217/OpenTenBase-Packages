version: "2.4"

services:
  # ============================================
  # Builder: compiles OpenTenBase from source
  # ============================================
  builder:
    build:
      context: .
      dockerfile: Dockerfile.builddev
    image: opentenbase-builddev:latest
    container_name: opentenbase-builder
    volumes:
      - ${OTB_SRC_DIR:-../../source/OpenTenBase}:/src/OpenTenBase
      - otb_install:/usr/lib/opentenbase
      - otb_ccache:/ccache
      - ./scripts:/scripts:ro
    environment:
      - OTB_PREFIX=/usr/lib/opentenbase
      - SRC_DIR=/src/OpenTenBase
      - CCACHE_DIR=/ccache
    command: ["/scripts/build.sh"]
    networks:
      - opentenbase

  # ============================================
  # GTM (Global Transaction Manager)
  # ============================================
  gtm:
    build:
      context: .
      dockerfile: Dockerfile.runtime-dev
    image: opentenbase-runtime-dev:latest

    container_name: opentenbase-gtm
    hostname: gtm
    environment:
      - NODE_TYPE=gtm
      - NODE_NAME=gtm
      - GTM_PORT=6666
    ports:
      - "6666:6666"
    volumes:
      - otb_install:/usr/lib/opentenbase:ro
      - gtm_data:/var/lib/opentenbase/data/gtm
    networks:
      - opentenbase
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6666'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ============================================
  # Coordinator
  # ============================================
  coordinator:
    build:
      context: .
      dockerfile: Dockerfile.runtime-dev
    image: opentenbase-runtime-dev:latest

    container_name: opentenbase-coordinator
    hostname: coordinator
    depends_on:
      gtm:
        condition: service_healthy
    environment:
      - NODE_TYPE=coordinator
      - NODE_NAME=coordinator
      - GTM_HOST=gtm
      - GTM_PORT=6666
      - COORD_HOST=coordinator
      - COORD_PORT=5432
    ports:
      - "5432:5432"
    volumes:
      - otb_install:/usr/lib/opentenbase:ro
      - coord_data:/var/lib/opentenbase/data/coordinator
    networks:
      - opentenbase
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/5432'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # ============================================
  # Datanode 1
  # ============================================
  datanode1:
    build:
      context: .
      dockerfile: Dockerfile.runtime-dev
    image: opentenbase-runtime-dev:latest

    container_name: opentenbase-datanode1
    hostname: datanode1
    depends_on:
      gtm:
        condition: service_healthy
    environment:
      - NODE_TYPE=datanode
      - NODE_NAME=datanode1
      - GTM_HOST=gtm
      - GTM_PORT=6666
      - COORD_HOST=coordinator
      - COORD_PORT=5432
      - DN_PORT=15432
    ports:
      - "15432:15432"
    volumes:
      - otb_install:/usr/lib/opentenbase:ro
      - dn1_data:/var/lib/opentenbase/data/datanode1
    networks:
      - opentenbase
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/15432'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # ============================================
  # Datanode 2
  # ============================================
  datanode2:
    build:
      context: .
      dockerfile: Dockerfile.runtime-dev
    image: opentenbase-runtime-dev:latest

    container_name: opentenbase-datanode2
    hostname: datanode2
    depends_on:
      gtm:
        condition: service_healthy
    environment:
      - NODE_TYPE=datanode
      - NODE_NAME=datanode2
      - GTM_HOST=gtm
      - GTM_PORT=6666
      - COORD_HOST=coordinator
      - COORD_PORT=5432
      - DN_PORT=15433
    ports:
      - "15433:15433"
    volumes:
      - otb_install:/usr/lib/opentenbase:ro
      - dn2_data:/var/lib/opentenbase/data/datanode2
    networks:
      - opentenbase
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/15433'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  otb_install:
  otb_ccache:
  gtm_data:
  coord_data:
  dn1_data:
  dn2_data:

networks:
  opentenbase:
    driver: bridge
